repos:
  - repo: local
    hooks:
      - id: go-lint
        name: golangci-lint
        entry: golangci-lint run
        language: golang
        pass_filenames: false

      - id: swag
        name: swag init and format
        entry: swag init -g cmd/main.go -o docs && swag fmt
        language: golang
        pass_filenames: false
        files: \.go$
